<h2>Details Grade</h2>

<button class="btn btn-primary btn-sm" (click)="goBack()">Back</button>
<form [formGroup]="gradeForm" class="form">

    <div class="form-group">
        <label for="name">Name</label>
        <input id="name" formControlName="name" readonly />
    </div>

    <div class="form-group">
        <label for="professor">Professor</label>
        <input id="professor" formControlName="professorName" readonly />
    </div>

    <div class="form-group">
        <label for="student">Student</label>
        <input id="student" formControlName="studentName" readonly />
    </div>

    <div class="form-group">
        <label for="value">Grade</label>
        <input id="value" type="number" formControlName="value" readonly />
    </div>

</form>
