<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Students</h2>
    <button class="btn btn-primary" (click)="create()">Create</button>
</div>

<div class="d-flex justify-content-between align-items-center mb-2">
    <div>
        Total: {{ totalCount }} | Página {{ page }} de {{ totalPages }}
    </div>

    <div>
        <label>Items por página:</label>
        <select class="form-select d-inline-block w-auto ms-2" (change)="changePageSize($any($event.target).value)">
            <option [selected]="pageSize == 5" value="5">5</option>
            <option [selected]="pageSize == 10" value="10">10</option>
            <option [selected]="pageSize == 20" value="20">20</option>
        </select>
    </div>
</div>


<table class="table table-striped mt-3">
    <thead class="thead-dark">
        <tr>
            <th scope="col">Name</th>
            <th scope="col">Actions</th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let student of students">
            <td>{{ student.name }}</td>
            <td>
                <button (click)="detail(student.id)">Detail</button>
                <button (click)="edit(student.id)">Edit</button>
                <button (click)="delete(student.id)">Delete</button>
            </td>
        </tr>

    </tbody>
</table>

<nav *ngIf="totalPages >= 1">
    <ul class="pagination justify-content-center">
        <li class="page-item" [class.disabled]="page === 1">
            <button class="page-link" (click)="changePage(page - 1)">«</button>
        </li>

        <li class="page-item" *ngFor="let p of pages" [class.active]="p === page">
            <button class="page-link" (click)="changePage(p)">
                {{ p }}
            </button>
        </li>

        <li class="page-item" [class.disabled]="page === totalPages">
            <button class="page-link" (click)="changePage(page + 1)">»</button>
        </li>

    </ul>
</nav>
